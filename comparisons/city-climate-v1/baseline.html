<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10城市气候三维图</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif; }
.container { width: 1000px; height: 700px; padding: 20px; }
h1 { color: #e2e8f0; font-size: 22px; font-weight: 500; text-align: center; margin-bottom: 12px; letter-spacing: 0.5px; }
.subtitle { color: #64748b; text-align: center; font-size: 13px; margin-bottom: 16px; }
#chart { width: 100%; height: 600px; }
</style>
</head>
<body>
<div class="container">
  <h1>🌍 城市气候三维关系图</h1>
  <p class="subtitle">温度 · 湿度 · 纬度 — 悬浮查看城市名</p>
  <div id="chart"></div>
</div>

<script>
const cities = [
  { name: '新加坡',  temp: 27, hum: 84, lat: 1.3,  pop: 560, color: '#ef4444' },
  { name: '曼谷',    temp: 28, hum: 75, lat: 13.8, pop: 1050,color: '#f97316' },
  { name: '香港',    temp: 23, hum: 78, lat: 22.3, pop: 750, color: '#eab308' },
  { name: '上海',    temp: 16, hum: 72, lat: 31.2, pop: 2600,color: '#22c55e' },
  { name: '东京',    temp: 16, hum: 65, lat: 35.7, pop: 3700,color: '#06b6d4' },
  { name: '伊斯坦布尔', temp: 15, hum: 72, lat: 41.0, pop: 1500, color: '#3b82f6' },
  { name: '伦敦',    temp: 11, hum: 80, lat: 51.5, pop: 890, color: '#8b5cf6' },
  { name: '柏林',    temp: 10, hum: 78, lat: 52.5, pop: 360, color: '#a855f7' },
  { name: '莫斯科',  temp:  5, hum: 75, lat: 55.8, pop: 1200,color: '#ec4899' },
  { name: '赫尔辛基',temp:  6, hum: 78, lat: 60.2, pop: 65,  color: '#f43f5e' },
];

// 按纬度排序，色板从暖到冷
const sorted = [...cities].sort((a, b) => a.lat - b.lat);

const trace = {
  type: 'scatter3d',
  mode: 'markers+text',
  x: sorted.map(d => d.temp),
  y: sorted.map(d => d.hum),
  z: sorted.map(d => d.lat),
  text: sorted.map(d => d.name),
  textposition: 'top center',
  textfont: { size: 11, color: '#94a3b8', family: 'PingFang SC, sans-serif' },
  marker: {
    size: sorted.map(d => Math.sqrt(d.pop) * 2.2),
    color: sorted.map(d => d.color),
    line: { color: '#1e293b', width: 1.5 },
    opacity: 0.9,
    symbol: 'circle',
  },
  hovertemplate:
    '<b>%{text}</b><br>' +
    '🌡 温度: %{x}°C<br>' +
    '💧 湿度: %{y}%<br>' +
    '📍 纬度: %{z}°N<br>' +
    '<extra></extra>',
};

const layout = {
  paper_bgcolor: '#0f172a',
  scene: {
    bgcolor: '#0f172a',
    xaxis: {
      title: { text: '🌡 温度 (°C)', font: { size: 13, color: '#94a3b8' } },
      gridcolor: '#1e293b',
      zerolinecolor: '#334155',
      tickfont: { color: '#64748b', size: 11 },
      range: [0, 35],
    },
    yaxis: {
      title: { text: '💧 湿度 (%)', font: { size: 13, color: '#94a3b8' } },
      gridcolor: '#1e293b',
      zerolinecolor: '#334155',
      tickfont: { color: '#64748b', size: 11 },
      range: [55, 95],
    },
    zaxis: {
      title: { text: '📍 纬度 (°N)', font: { size: 13, color: '#94a3b8' } },
      gridcolor: '#1e293b',
      zerolinecolor: '#334155',
      tickfont: { color: '#64748b', size: 11 },
      range: [-5, 70],
    },
    camera: { eye: { x: 1.8, y: -1.6, z: 0.8 } },
  },
  margin: { l: 0, r: 0, b: 0, t: 0 },
  hovermode: 'closest',
  hoverlabel: {
    bgcolor: '#1e293b',
    bordercolor: '#334155',
    font: { color: '#e2e8f0', size: 13, family: 'PingFang SC, sans-serif' },
  },
};

const config = {
  responsive: true,
  displayModeBar: false,
};

Plotly.newPlot('chart', [trace], layout, config);

// 窗口自适应
window.addEventListener('resize', () => {
  Plotly.Plots.resize(document.getElementById('chart'));
});
</script>
</body>
</html>
