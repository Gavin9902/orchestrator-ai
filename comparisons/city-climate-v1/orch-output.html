<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球城市 3D 散点图 — 温度、湿度、纬度</title>
    <script src="https://cdn.plot.ly/plotly-3.0.1.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #0b0e1a 0%, #1a1f35 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
        }
        .chart-container {
            width: 100%;
            max-width: 1200px;
            background: rgba(255,255,255,0.04);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
            padding: 12px;
        }
        h1 {
            color: #e8edf5;
            font-weight: 600;
            font-size: 1.6rem;
            letter-spacing: 0.3px;
            margin-bottom: 4px;
        }
        .subtitle {
            color: #8892b0;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        .legend-note {
            color: #5a6380;
            font-size: 0.75rem;
            text-align: center;
            margin-top: 12px;
        }
        #plotly-chart {
            width: 100%;
            height: 700px;
        }
        @media (max-width: 640px) {
            #plotly-chart { height: 500px; }
            h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="chart-container">
        <h1>全球城市气候 3D 散点图</h1>
        <p class="subtitle">气泡大小 = 人口 | 鼠标拖拽旋转 · 悬停查看详情</p>
        <div id="plotly-chart"></div>
        <p class="legend-note">数据来源：各城市年均气候统计 · 人口为都市区估算</p>
    </div>

    <script>
        (function() {
            // ---- 10 个真实城市的气候数据 ----
            // 纬度(°N, 南半球为负) | 年均温(℃) | 年均湿度(%) | 人口(百万)
            const cities = [
                { name: "Singapore",        lat:  1.35, temp: 27.0, hum: 84,  pop: 5.7  },
                { name: "Tokyo",            lat: 35.68, temp: 16.5, hum: 66,  pop: 37.4 },
                { name: "London",           lat: 51.51, temp: 11.0, hum: 75,  pop: 9.0  },
                { name: "Cairo",            lat: 30.04, temp: 22.5, hum: 40,  pop: 9.5  },
                { name: "Sydney",           lat:-33.87, temp: 18.5, hum: 65,  pop: 5.3  },
                { name: "Reykjavik",        lat: 64.15, temp:  5.0, hum: 78,  pop: 0.23 },
                { name: "Mumbai",           lat: 19.08, temp: 27.0, hum: 73,  pop: 20.7 },
                { name: "Moscow",           lat: 55.76, temp:  5.5, hum: 74,  pop: 12.5 },
                { name: "Nairobi",          lat: -1.29, temp: 19.5, hum: 65,  pop: 4.4  },
                { name: "Bangkok",          lat: 13.76, temp: 28.5, hum: 78,  pop: 10.5 },
            ];

            const trace = {
                x: cities.map(c => c.lat),
                y: cities.map(c => c.temp),
                z: cities.map(c => c.hum),
                mode: 'markers+text',
                type: 'scatter3d',
                text: cities.map(c => c.name),
                textposition: 'top center',
                hoverinfo: 'text',
                hovertext: cities.map(c =>
                    `<b>${c.name}</b><br>` +
                    `纬度: ${c.lat}°<br>` +
                    `年均温: ${c.temp}°C<br>` +
                    `年均湿度: ${c.hum}%<br>` +
                    `人口: ${c.pop}M`
                ),
                marker: {
                    size: cities.map(c => Math.sqrt(c.pop) * 10),
                    color: cities.map(c => c.temp),
                    colorscale: [
                        [0,    '#1a3a5c'],
                        [0.2,  '#2e6b8a'],
                        [0.4,  '#5fa3b5'],
                        [0.5,  '#95c9a0'],
                        [0.6,  '#d4b85a'],
                        [0.7,  '#e8903a'],
                        [0.8,  '#d95f2a'],
                        [1,    '#b31e22']
                    ],
                    cmin: 0,
                    cmax: 30,
                    colorbar: {
                        title: { text: '温度 (°C)', side: 'right' },
                        thickness: 15,
                        len: 0.6,
                        x: 1.05,
                        tickfont: { color: '#8892b0', size: 11 },
                        titlefont: { color: '#e8edf5', size: 12 }
                    },
                    line: {
                        color: 'rgba(255,255,255,0.3)',
                        width: 0.5
                    },
                    opacity: 0.9,
                    symbol: 'circle',
                    sizemode: 'area',
                    sizeref: 0.5
                }
            };

            const layout = {
                title: '',
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                scene: {
                    xaxis: {
                        title: { text: '纬度 (°N)', font: { color: '#8892b0', size: 13 } },
                        gridcolor: 'rgba(255,255,255,0.06)',
                        zerolinecolor: 'rgba(255,255,255,0.1)',
                        tickfont: { color: '#8892b0', size: 10 },
                        showspikes: false,
                        backgroundcolor: 'rgba(0,0,0,0)'
                    },
                    yaxis: {
                        title: { text: '年均温 (°C)', font: { color: '#8892b0', size: 13 } },
                        gridcolor: 'rgba(255,255,255,0.06)',
                        zerolinecolor: 'rgba(255,255,255,0.1)',
                        tickfont: { color: '#8892b0', size: 10 },
                        showspikes: false,
                        backgroundcolor: 'rgba(0,0,0,0)'
                    },
                    zaxis: {
                        title: { text: '年均湿度 (%)', font: { color: '#8892b0', size: 13 } },
                        gridcolor: 'rgba(255,255,255,0.06)',
                        zerolinecolor: 'rgba(255,255,255,0.1)',
                        tickfont: { color: '#8892b0', size: 10 },
                        showspikes: false,
                        backgroundcolor: 'rgba(0,0,0,0)'
                    },
                    camera: {
                        eye: { x: 1.8, y: 1.8, z: 1.2 },
                        center: { x: 0, y: 0, z: 0 }
                    },
                    hovermode: 'closest',
                    dragmode: 'turntable'
                },
                margin: { l: 0, r: 80, t: 0, b: 0 },
                font: { color: '#e8edf5' },
                uirevision: 'true'
            };

            const config = {
                responsive: true,
                displayModeBar: true,
                modeBarButtonsToRemove: [
                    'sendDataToCloud', 'lasso2d', 'select2d',
                    'zoomIn3d', 'zoomOut3d', 'hoverClosest3d',
                    'hoverClosestCartesian', 'hoverCompareCartesian'
                ],
                displaylogo: false,
                toImageButtonOptions: {
                    format: 'png',
                    filename: 'city_3d_chart',
                    width: 1280,
                    height: 800
                }
            };

            Plotly.newPlot('plotly-chart', [trace], layout, config);
        })();
    </script>
</body>
</html>
